openapi: 3.1.0
info:
  title: AFSCP Internal API
  version: 1.0.0
  description: Product-agnostic internal storage control plane API.
  license:
    name: Proprietary internal
    identifier: LicenseRef-Proprietary
servers:
  - url: https://afscp.internal
security:
  - serviceAuth: []
components:
  securitySchemes:
    serviceAuth:
      type: http
      scheme: bearer
      description: Deployment service credential or mTLS-derived bearer facade.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: true
      schema:
        type: string
    ActorType:
      name: X-AFSCP-Actor-Type
      in: header
      required: true
      schema:
        type: string
    ActorId:
      name: X-AFSCP-Actor-Id
      in: header
      required: true
      schema:
        type: string
    CallerService:
      name: X-AFSCP-Caller-Service
      in: header
      required: true
      schema:
        type: string
  schemas:
    OperationEnvelope:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/OperationEnvelope
    ErrorEnvelope:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/ErrorEnvelope
    Namespace:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/Namespace
    UpsertNamespaceRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/UpsertNamespaceRequest
    DisableNamespaceRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/DisableNamespaceRequest
    Volume:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/Volume
    VolumeHealth:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/VolumeHealth
    NamespaceVolumeBinding:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/NamespaceVolumeBinding
    Repo:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/Repo
    SavePoint:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/SavePoint
    CreateRepoRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CreateRepoRequest
    LifecycleRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/LifecycleRequest
    PurgeRepoRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/PurgeRepoRequest
    CreateSavePointRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CreateSavePointRequest
    RestorePreviewRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RestorePreviewRequest
    RestoreRunRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RestoreRunRequest
    CreateRepoTemplateRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CreateRepoTemplateRequest
    CloneRepoTemplateRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CloneRepoTemplateRequest
    CreateExportRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CreateExportRequest
    ExportSession:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/ExportSession
    ExportCreateOperationEnvelope:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/ExportCreateOperationEnvelope
    CreateWorkloadMountBindingRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/CreateWorkloadMountBindingRequest
    MountBindingStatusUpdateRequest:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/MountBindingStatusUpdateRequest
    WorkloadMountBinding:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/WorkloadMountBinding
    OrchestratorMountPlan:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/OrchestratorMountPlan
    OperationRecord:
      $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/OperationRecord
  responses:
    Error:
      description: Standard error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
paths:
  /internal/v1/volumes/{volumeId}:ensure:
    post:
      operationId: ensureVolume
      summary: Ensure a managed volume exists.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: volumeId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/VolumeId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Volume ensured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/volumes/{volumeId}/health:
    get:
      operationId: getVolumeHealth
      summary: Get volume health.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: volumeId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/VolumeId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Volume health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeHealth"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/namespaces/{namespaceId}:
    put:
      operationId: upsertNamespace
      summary: Create or update a namespace record.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: namespaceId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/NamespaceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertNamespaceRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Namespace upsert operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/namespaces/{namespaceId}:disable:
    post:
      operationId: disableNamespace
      summary: Disable a namespace.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: namespaceId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/NamespaceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisableNamespaceRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Namespace disable operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/namespaces/{namespaceId}/volume-binding:
    put:
      operationId: putNamespaceVolumeBinding
      summary: Upsert namespace volume binding and policy.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: namespaceId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/NamespaceId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NamespaceVolumeBinding"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Binding upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: getNamespaceVolumeBinding
      summary: Get namespace volume binding and policy.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: namespaceId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/NamespaceId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceVolumeBinding"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos:
    post:
      operationId: createRepo
      summary: Create a repo.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepoRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Repo create operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listRepos
      summary: List namespace repos.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: namespace_id
          in: query
          required: true
          schema:
            type: string
        - name: lifecycle_status
          in: query
          required: false
          schema:
            type: string
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Namespace-bound storage inventory, not product catalog.
          content:
            application/json:
              schema:
                type: object
                required: [repos]
                properties:
                  repos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Repo"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:
    get:
      operationId: getRepo
      summary: Get a repo.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Repo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repo"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:archive:
    post:
      operationId: archiveRepo
      summary: Archive a repo.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Archive operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:restore-archived:
    post:
      operationId: restoreArchivedRepo
      summary: Restore an archived repo.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Restore archived operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:delete:
    post:
      operationId: deleteRepo
      summary: Delete a repo to tombstone.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Delete to tombstone operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:restore-tombstoned:
    post:
      operationId: restoreTombstonedRepo
      summary: Restore a tombstoned repo.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Restore tombstoned operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}:purge:
    post:
      operationId: purgeRepo
      summary: Permanently purge a repo.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurgeRepoRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Purge operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}/save-points:
    post:
      operationId: createSavePoint
      summary: Create a save point.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavePointRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Save point operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listSavePoints
      summary: List save points.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Save point list.
          content:
            application/json:
              schema:
                type: object
                required: [save_points]
                properties:
                  save_points:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavePoint"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}/restore-preview:
    post:
      operationId: restorePreview
      summary: Create a restore preview.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestorePreviewRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Restore preview operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}/restore-run:
    post:
      operationId: restoreRun
      summary: Run a restore from a preview.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRunRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Restore run operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repo-templates:
    post:
      operationId: createRepoTemplate
      summary: Create a repo template.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepoTemplateRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Template create operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repo-templates/{templateId}:clone:
    post:
      operationId: cloneRepoTemplate
      summary: Clone a repo template.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: templateId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/TemplateId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneRepoTemplateRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Template clone operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}/exports:
    post:
      operationId: createExport
      summary: Create a WebDAV export.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: repoId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/RepoId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Export create operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportCreateOperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/exports/{exportId}:
    get:
      operationId: getExport
      summary: Get an export session.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - name: exportId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/ExportId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "200":
          description: Export session without secret-bearing credential unless create response policy permits it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportSession"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: revokeExport
      summary: Revoke an export session.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CallerService"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorId"
        - name: exportId
          in: path
          required: true
          schema:
            $ref: ../schemas/afscp-internal-v1.schema.json#/$defs/ExportId
      responses:
        "400":
          $ref: "#/components/responses/Error"
        "202":
          description: Export revoke operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationEnvelope"
        default:
          $ref: "#/components/responses/Error"
  /internal/v1/repos/{repoId}/workload-mount-bindings:
    post:
